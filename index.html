<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>共聚焦原理互动展示｜荧光信号显影台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=2026-05-12" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-band" aria-labelledby="page-title">
        <div>
          <p class="kicker">荧光信号显影台</p>
          <h1 id="page-title">共聚焦原理互动展示</h1>
        </div>
        <p class="lead">
          激光逐点照亮焦平面，探测器只接收被标记结构发出的荧光；屏幕上的颜色不是样本本来的颜色，而是把信号强弱和不同通道翻译成肉眼容易读懂的标签。
        </p>
      </header>

      <main class="lab-grid" aria-label="荧光成像互动台">
        <section class="sample-panel" aria-labelledby="sample-title">
          <div class="panel-head">
            <p class="eyebrow">样本入口</p>
            <h2 id="sample-title">选择一张图像</h2>
          </div>

          <div class="sample-list" aria-label="示例样本">
            <button class="sample-button is-active" type="button" data-sample="city" aria-pressed="true">
              <span class="sample-thumb thumb-city" aria-hidden="true"></span>
              <span>
                <strong>城市灯光</strong>
                <small>默认主图，亮点像最直观的信号</small>
              </span>
            </button>
            <button class="sample-button" type="button" data-sample="cells" aria-pressed="false">
              <span class="sample-thumb thumb-cells" aria-hidden="true"></span>
              <span>
                <strong>细胞结构</strong>
                <small>DAPI 标记细胞核，绿色骨架，红色颗粒</small>
              </span>
            </button>
            <button class="sample-button" type="button" data-sample="chloroplast" aria-pressed="false">
              <span class="sample-thumb thumb-chloroplast" aria-hidden="true"></span>
              <span>
                <strong>叶片叶脉</strong>
                <small>叶脉背景，绿色叶绿体，红色自发荧光</small>
              </span>
            </button>
            <button class="sample-button" type="button" data-sample="fibers" aria-pressed="false">
              <span class="sample-thumb thumb-fibers" aria-hidden="true"></span>
              <span>
                <strong>神经网络</strong>
                <small>蓝色胞体，红绿神经突起</small>
              </span>
            </button>
          </div>

          <button class="upload-target" type="button" id="uploadButton">
            <span class="upload-mark" aria-hidden="true">+</span>
            <span>
              <strong>上传本地图像</strong>
              <small>浏览器内处理，图片不会离开现场设备</small>
            </span>
          </button>
          <input id="imageInput" type="file" accept="image/*" hidden />

          <div class="upload-cache" aria-labelledby="upload-cache-title">
            <div class="cache-head">
              <p class="section-label" id="upload-cache-title">本地图像缓存</p>
              <small>最近 3 张</small>
            </div>
            <div class="cache-list" id="uploadCacheList" aria-live="polite">
              <p class="cache-empty">暂无本地图像</p>
            </div>
          </div>

          <div class="action-row sample-actions" aria-label="输出操作">
            <button class="action-button" type="button" id="revealButton">显影全部</button>
            <button class="action-button" type="button" id="resetButton">清空显影</button>
            <button class="action-button primary" type="button" id="downloadButton">导出图像</button>
          </div>
        </section>

        <section class="scope-panel" aria-labelledby="scope-title">
          <div class="scope-toolbar">
            <div>
              <p class="eyebrow">模拟显微镜视野</p>
              <h2 id="scope-title">焦平面信号采集与伪彩重建</h2>
            </div>
            <div class="live-readout" aria-live="polite">
              <span id="modeReadout">明场找焦</span>
              <span id="signalReadout">门槛 30</span>
            </div>
          </div>

          <div class="scope-viewport" id="scopeViewport">
            <canvas id="scopeCanvas" aria-label="荧光图像处理结果"></canvas>
            <div class="scan-glass" aria-hidden="true"></div>
            <div class="corner-label top-left" aria-hidden="true">FOCAL PLANE</div>
            <div class="corner-label bottom-right" aria-hidden="true">20 um</div>
            <div class="scale-bar" aria-hidden="true"></div>
            <div class="scope-guide" aria-label="成像流程">
              <button class="flow-button" type="button" data-flow="acquire" aria-pressed="false">
                <strong>模拟采集</strong>
                <span>拖拽采集局部信号</span>
              </button>
              <button class="flow-button" type="button" data-flow="raster" aria-pressed="false">
                <strong>点扫描</strong>
                <span>单点逐行读完整图</span>
              </button>
              <button class="flow-button" type="button" data-flow="color" aria-pressed="false">
                <strong>伪彩叠加</strong>
                <span>灰度翻译成通道颜色</span>
              </button>
            </div>
          </div>

          <div class="mode-strip" role="tablist" aria-label="观察阶段">
            <button class="mode-button is-active" type="button" role="tab" data-mode="brightfield" aria-selected="true">明场找焦</button>
            <button class="mode-button" type="button" role="tab" data-mode="gray" aria-selected="false">灰度信号</button>
            <button class="mode-button" type="button" role="tab" data-mode="pseudo" aria-selected="false">伪彩显影</button>
            <button class="mode-button" type="button" role="tab" data-mode="merge" aria-selected="false">多通道合成</button>
          </div>
        </section>

        <section class="control-panel" aria-labelledby="control-title">
          <div class="panel-head">
            <p class="eyebrow">信号控制台</p>
            <h2 id="control-title">调节采集与显示参数</h2>
          </div>

          <div class="control-stack">
            <label class="range-control">
              <span>
                <strong>信号门槛 Threshold</strong>
                <small>门槛像一道筛子：背景和弱噪声留在黑场，足够亮的信号才被看见</small>
              </span>
              <output id="thresholdValue">30</output>
              <input id="thresholdSlider" type="range" min="0" max="100" value="30" />
            </label>

            <label class="range-control">
              <span>
                <strong>探测器增益 Gain</strong>
                <small>探测器把少量光子放大成电信号；增益越高，弱信号越容易被放大成亮点</small>
              </span>
              <output id="intensityValue">125%</output>
              <input id="intensitySlider" type="range" min="0" max="400" value="125" />
            </label>

            <label class="range-control">
              <span>
                <strong>点扩散 PSF</strong>
                <small>显微镜看见的点不是数学上的点，而是一个小光斑；光斑越宽，细节越容易糊开</small>
              </span>
              <output id="glowValue">18</output>
              <input id="glowSlider" type="range" min="0" max="40" value="18" />
            </label>

            <label class="range-control">
              <span>
                <strong>黑场扣除 Offset</strong>
                <small>真实图像总有暗背景；扣除过少会雾蒙蒙，扣除过多会把微弱结构一起吃掉</small>
              </span>
              <output id="backgroundValue">58%</output>
              <input id="backgroundSlider" type="range" min="0" max="100" value="58" />
            </label>
          </div>

          <div class="channel-area" aria-label="荧光通道">
            <p class="section-label">荧光通道</p>
            <p class="channel-note">激发光先照进样本，探测器只收发射光：比如 FITC 常用蓝光入射，看到绿色信号。</p>
            <div class="channel-grid">
              <button class="channel-button is-on channel-blue" type="button" data-channel="blue" aria-pressed="true">
                <span class="channel-dot" aria-hidden="true"></span>
                <span class="channel-copy">
                  <strong>DAPI</strong>
                  <small>紫外/紫光入射 -> 蓝色发射</small>
                </span>
              </button>
              <button class="channel-button is-on channel-green" type="button" data-channel="green" aria-pressed="true">
                <span class="channel-dot" aria-hidden="true"></span>
                <span class="channel-copy">
                  <strong>FITC</strong>
                  <small>蓝光入射 -> 绿色发射</small>
                </span>
              </button>
              <button class="channel-button is-on channel-red" type="button" data-channel="red" aria-pressed="true">
                <span class="channel-dot" aria-hidden="true"></span>
                <span class="channel-copy">
                  <strong>TRITC</strong>
                  <small>绿光入射 -> 红橙发射</small>
                </span>
              </button>
              <button class="channel-button channel-magenta" type="button" data-channel="magenta" aria-pressed="false">
                <span class="channel-dot" aria-hidden="true"></span>
                <span class="channel-copy">
                  <strong>Cy5</strong>
                  <small>红光入射 -> 远红发射</small>
                </span>
              </button>
            </div>
          </div>
        </section>
      </main>

    </div>

    <script src="./app.js?v=2026-05-12"></script>
  </body>
</html>
